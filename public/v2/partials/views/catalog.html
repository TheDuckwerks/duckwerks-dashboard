    <!-- ── Catalog Intake View ──────────────────────────────────────────── -->
    <div x-show="$store.dw.activeView === 'catalog'" x-data="catalogView">
      <div class="hero-band slim">
        <div class="hero-photo"></div>
        <div class="hero-head">
          <div class="hero-crumbs">DW<span class="sep">/</span><b>catalog</b></div>
          <div class="hero-tools"></div>
        </div>
      </div>
      <div style="padding:24px; max-width:560px">

      <!-- Toast -->
      <div x-show="toast" x-transition
           :style="toast?.ok ? 'background:var(--green)' : 'background:var(--red)'"
           style="padding:8px 14px; border-radius:4px; margin-bottom:16px; color:#000; font-size:13px; font-weight:bold"
           x-text="toast?.msg"></div>

      <form @submit.prevent="submit" style="display:flex; flex-direction:column; gap:12px">

        <!-- Disc # -->
        <div style="display:flex; gap:16px; align-items:center">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px">DISC #</label>
          <span style="color:var(--yellow); font-family:'Bebas Neue',sans-serif; font-size:22px" x-text="nextDiscNum ?? '…'"></span>
        </div>

        <!-- Box -->
        <div style="display:flex; gap:16px; align-items:center">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px; flex-shrink:0">BOX</label>
          <input data-focus type="text" x-model="box" placeholder="e.g. S1"
                 style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:200px">
        </div>

        <!-- Manufacturer typeahead -->
        <div style="display:flex; gap:16px; align-items:flex-start">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px; flex-shrink:0; padding-top:8px">MANUFACTURER</label>
          <div style="position:relative">
            <input type="text" x-model="manufacturerQuery"
                   @input="manufacturerOpen = true; manufacturerIndex = -1"
                   @focus="manufacturerOpen = true"
                   @keydown="mfgKeydown($event)"
                   @keydown.escape="manufacturerOpen = false"
                   placeholder="type to search…"
                   style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:260px">
            <div x-show="manufacturerOpen && mfgFiltered.length > 0" x-cloak
                 @click.outside="manufacturerOpen = false"
                 style="position:absolute; top:100%; left:0; width:260px; background:var(--surface); border:1px solid var(--border); border-top:none; border-radius:0 0 4px 4px; max-height:200px; overflow-y:auto; z-index:50">
              <template x-for="(m, i) in mfgFiltered" :key="m">
                <div @click="selectManufacturer(m)" x-text="m"
                     :style="i === manufacturerIndex ? 'background:var(--border)' : ''"
                     style="padding:6px 10px; font-size:13px; cursor:pointer; color:var(--white)"
                     @mouseenter="manufacturerIndex = i"
                     @mouseleave="manufacturerIndex = -1"></div>
              </template>
            </div>
          </div>
        </div>

        <!-- Mold -->
        <div style="display:flex; gap:16px; align-items:center">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px; flex-shrink:0">MOLD</label>
          <select x-model="mold"
                  style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:200px">
            <option value="">— select —</option>
            <template x-for="m in molds" :key="m"><option :value="m" x-text="m"></option></template>
          </select>
          <input type="text" x-model="moldNew" placeholder="or new mold"
                 style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:180px">
        </div>

        <!-- Type -->
        <div style="display:flex; gap:16px; align-items:center">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px; flex-shrink:0">TYPE</label>
          <select x-model="type"
                  style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:200px">
            <option value="">— select —</option>
            <template x-for="t in TYPES" :key="t">
              <option :value="t" x-text="t"></option>
            </template>
          </select>
        </div>

        <!-- Plastic -->
        <div style="display:flex; gap:16px; align-items:center">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px; flex-shrink:0">PLASTIC</label>
          <select x-model="plastic"
                  style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:200px">
            <option value="">— select —</option>
            <template x-for="p in plastics" :key="p.plastic">
              <option :value="p.plastic" x-text="p.tier === 'Baseline' ? p.plastic + ' (base)' : p.plastic"></option>
            </template>
          </select>
          <input type="text" x-model="plasticNew" placeholder="or new plastic"
                 style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:180px">
        </div>

        <!-- Run/Edition -->
        <div style="display:flex; gap:16px; align-items:center">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px; flex-shrink:0">RUN / EDITION</label>
          <input type="text" x-model="run" placeholder="optional"
                 style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:200px">
        </div>

        <!-- Notes -->
        <div style="display:flex; gap:16px; align-items:center">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px; flex-shrink:0">NOTES</label>
          <input type="text" x-model="notes" placeholder="optional"
                 style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:200px">
        </div>

        <!-- Condition -->
        <div style="display:flex; gap:16px; align-items:center">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px; flex-shrink:0">CONDITION</label>
          <div style="display:flex; gap:0">
            <button type="button" @click="condition = 'NEW'"
                    :style="condition === 'NEW' ? 'background:var(--green); color:#000' : 'background:var(--surface); color:var(--muted)'"
                    style="padding:6px 14px; border:1px solid var(--border); border-radius:4px 0 0 4px; font-family:inherit; font-size:13px; cursor:pointer">NEW</button>
            <button type="button" @click="condition = 'NEW_OTHER'"
                    :style="condition === 'NEW_OTHER' ? 'background:var(--green); color:#000; opacity:0.7' : 'background:var(--surface); color:var(--muted)'"
                    style="padding:6px 14px; border:1px solid var(--border); border-left:none; font-family:inherit; font-size:13px; cursor:pointer">NEW_OTHER</button>
            <button type="button" @click="condition = 'USED'"
                    :style="condition === 'USED' ? 'background:var(--yellow); color:#000' : 'background:var(--surface); color:var(--muted)'"
                    style="padding:6px 14px; border:1px solid var(--border); border-left:none; border-radius:0 4px 4px 0; font-family:inherit; font-size:13px; cursor:pointer">USED</button>
          </div>
        </div>

        <!-- Weight -->
        <div style="display:flex; gap:16px; align-items:center">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px; flex-shrink:0">WEIGHT (g)</label>
          <input type="number" x-model.number="weight" min="100" max="200"
                 style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:100px">
        </div>

        <!-- Color -->
        <div style="display:flex; gap:16px; align-items:center">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px; flex-shrink:0">COLOR</label>
          <select x-model="color"
                  style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:200px">
            <option value="">— select —</option>
            <template x-for="c in COLORS" :key="c">
              <option :value="c" x-text="c"></option>
            </template>
          </select>
        </div>

        <!-- List Price -->
        <div style="display:flex; gap:16px; align-items:center">
          <label style="color:var(--muted); font-size:11px; letter-spacing:1px; width:140px; flex-shrink:0">LIST PRICE ($)</label>
          <input type="number" x-model.number="listPrice" min="0" step="1"
                 style="background:var(--surface); border:1px solid var(--border); color:var(--white); padding:6px 10px; border-radius:4px; font-family:inherit; font-size:13px; width:100px">
        </div>

        <!-- Flight numbers (auto-populated from lookup, read-only) -->
        <div x-show="flightData" x-cloak style="font-size:11px; color:var(--muted); margin-top:-4px">
          <span style="color:var(--white); letter-spacing:1px">FLIGHT:</span>
          Speed <span x-text="flightData?.speed"></span> &nbsp;|&nbsp;
          Glide <span x-text="flightData?.glide"></span> &nbsp;|&nbsp;
          Turn <span x-text="flightData?.turn"></span> &nbsp;|&nbsp;
          Fade <span x-text="flightData?.fade"></span> &nbsp;|&nbsp;
          Stability <span x-text="flightData?.stability"></span>
        </div>

        <!-- Submit -->
        <div style="margin-top:8px">
          <button type="submit" :disabled="submitting"
                  style="background:var(--blue); color:#fff; border:none; padding:10px 28px; border-radius:4px; font-family:inherit; font-size:14px; letter-spacing:1px; cursor:pointer"
                  x-text="submitting ? 'Saving…' : 'Save Disc'"></button>
        </div>

      </form>

      <!-- ── Bulk List to eBay (web listing, #139) ──────────────────────────── -->
      <div style="margin-top:48px">
        <div class="modal-section-label" style="margin-bottom:12px">Bulk List to eBay</div>

        <div style="display:grid;grid-template-columns:150px 1fr;gap:8px;align-items:center;margin-bottom:8px">
          <span style="font:700 10px/1 var(--mono);letter-spacing:.08em;color:var(--muted)">DWG range</span>
          <div style="display:flex;gap:10px;align-items:center">
            <input type="text" x-model="blkRange" @input="blkResolveDiscs()" placeholder="e.g. 293-298 or 293,295"
              style="font-size:12px;padding:4px 8px;border:1px solid var(--border);background:var(--bg);color:var(--ink-1);width:200px">
            <span style="font:700 10px/1 var(--mono);color:var(--muted)" x-text="blkDiscs.length + ' Prepping disc(s)'"></span>
          </div>
        </div>

        <div style="display:grid;grid-template-columns:150px 1fr;gap:8px;align-items:center;margin-bottom:8px">
          <span style="font:700 10px/1 var(--mono);letter-spacing:.08em;color:var(--muted)">photos / disc</span>
          <input type="number" min="1" x-model.number="blkPerDisc"
            style="font-size:12px;padding:4px 8px;border:1px solid var(--border);background:var(--bg);color:var(--ink-1);width:60px">
        </div>

        <div style="display:grid;grid-template-columns:150px 1fr;gap:8px;align-items:center;margin-bottom:12px">
          <span style="font:700 10px/1 var(--mono);letter-spacing:.08em;color:var(--muted)">photos</span>
          <div style="display:flex;gap:10px;align-items:center">
            <input type="file" multiple accept="image/jpeg,image/jpg"
              @change="blkFiles = Array.from($event.target.files)"
              style="font-size:11px;color:var(--ink-2)">
            <button @click="blkUploadPhotos()" :disabled="blkUploading || !blkDiscs.length || !blkFiles.length"
              style="font:700 9px/1 var(--mono);letter-spacing:.1em;padding:4px 14px;background:var(--blue);color:#fff;border:none;cursor:pointer;opacity:1"
              :style="(blkUploading || !blkDiscs.length || !blkFiles.length) ? 'opacity:.4;cursor:not-allowed' : ''"
              x-text="blkUploading ? 'UPLOADING…' : 'UPLOAD + MAP'"></button>
          </div>
        </div>

        <!-- mapping preview -->
        <template x-if="blkMapping">
          <div style="border:1px solid var(--border);margin-bottom:12px">
            <template x-for="d in blkDiscs" :key="d.id">
              <div style="display:flex;gap:12px;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border)">
                <span style="font:700 11px/1 var(--mono);white-space:nowrap;width:70px" x-text="d.sku"></span>
                <div style="display:flex;gap:4px;width:150px">
                  <template x-for="url in (blkMapping[d.id] || [])" :key="url">
                    <img :src="url" loading="lazy" style="width:40px;height:40px;object-fit:cover;border:1px solid var(--border)">
                  </template>
                  <span x-show="!(blkMapping[d.id] || []).length" style="font:700 9px/1 var(--mono);color:var(--red);align-self:center">NO PHOTOS</span>
                </div>
                <span style="font-size:11px;color:var(--ink-2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="d.title"></span>
                <span style="font:700 11px/1 var(--mono);color:var(--ink-1);width:50px;text-align:right" x-text="d.price ? '$' + d.price : '—'"></span>
                <span style="width:110px;text-align:right">
                  <span x-show="blkResults[d.id]?.ok" style="font:700 9px/1 var(--mono);color:var(--green)">LISTED ✓</span>
                  <a x-show="blkResults[d.id]?.ok" :href="blkResults[d.id]?.url" target="_blank" style="font:700 9px/1 var(--mono);color:var(--blue);text-decoration:none;margin-left:6px">VIEW →</a>
                  <span x-show="blkResults[d.id]?.error" style="font:700 9px/1 var(--mono);color:var(--red)" x-text="blkResults[d.id]?.error"></span>
                </span>
              </div>
            </template>
          </div>
        </template>

        <!-- list -->
        <template x-if="blkMapping">
          <div style="display:flex;gap:10px;align-items:center">
            <button @click="blkList()" :disabled="blkListing"
              style="font:700 9px/1 var(--mono);letter-spacing:.1em;padding:6px 18px;background:var(--green);color:#03110a;border:none;cursor:pointer"
              :style="blkListing ? 'opacity:.5;cursor:not-allowed' : ''"
              x-text="blkListing ? ('LISTING… ' + blkProgress.done + '/' + blkProgress.total) : ('BULK LIST ' + blkDiscs.length + ' DISC(S)')"></button>
            <span style="font:700 9px/1 var(--mono);color:var(--muted)">creates + publishes NEW eBay offers — goes live</span>
          </div>
        </template>
      </div>

      <!-- ── Inventory ──────────────────────────────────────────────────────── -->
      <div style="margin-top:48px">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
          <div class="modal-section-label">Inventory</div>
          <button @click="inventoryShowSold = !inventoryShowSold; loadInventory()"
            style="font:700 9px/1 var(--mono);letter-spacing:.1em;padding:3px 8px;background:transparent;border:1px solid var(--ink-3);color:var(--ink-2);cursor:pointer"
            x-text="inventoryShowSold ? 'HIDE SOLD' : 'SHOW SOLD'"></button>
        </div>
        <!-- Batch update banner -->
        <template x-if="ebayQueue.length > 0 || ebayBatchRunning">
          <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 12px;margin-bottom:12px;background:var(--surface);border:1px solid var(--blue)">
            <span style="font:700 10px/1 var(--mono);letter-spacing:.08em;color:var(--blue)"
                  x-text="ebayBatchRunning ? ebayBatchProgress.done + ' / ' + ebayBatchProgress.total + ' UPDATED...' : ebayQueue.length + ' ITEM' + (ebayQueue.length === 1 ? '' : 'S') + ' QUEUED'"></span>
            <button @click="ebayBatchUpdate()" :disabled="ebayBatchRunning"
              style="font:700 9px/1 var(--mono);letter-spacing:.1em;padding:4px 14px;background:var(--blue);color:#fff;border:none;cursor:pointer">
              UPDATE ALL ON EBAY
            </button>
          </div>
        </template>

        <div x-show="inventoryLoading" style="color:var(--muted);font-size:11px;letter-spacing:1px">Loading...</div>
        <div x-show="inventoryErr" x-text="inventoryErr" style="color:var(--red);font-size:11px"></div>
        <template x-if="!inventoryLoading && inventory.length === 0">
          <div style="color:var(--muted);font-size:11px">No inventory records.</div>
        </template>
        <template x-if="!inventoryLoading && inventory.length > 0">
          <div>
            <table class="tb">
              <thead>
                <tr>
                  <th class="sortable" :class="{'sort-active': invSortKey==='sku'}"           @click="invSortBy('sku')"          style="width:80px">SKU<span x-text="invSortGlyph('sku')"></span></th>
                  <th class="sortable" :class="{'sort-active': invSortKey==='location'}"      @click="invSortBy('location')"     style="width:40px">Loc<span x-text="invSortGlyph('location')"></span></th>
                  <th class="sortable" :class="{'sort-active': invSortKey==='manufacturer'}"  @click="invSortBy('manufacturer')" style="width:90px">Mfg<span x-text="invSortGlyph('manufacturer')"></span></th>
                  <th class="sortable" :class="{'sort-active': invSortKey==='mold'}"          @click="invSortBy('mold')"         style="width:110px">Mold<span x-text="invSortGlyph('mold')"></span></th>
                  <th class="sortable" :class="{'sort-active': invSortKey==='title'}"         @click="invSortBy('title')"        >Title<span x-text="invSortGlyph('title')"></span></th>
                  <th class="sortable r" :class="{'sort-active': invSortKey==='price'}"       @click="invSortBy('price')"        style="width:64px">Price<span x-text="invSortGlyph('price')"></span></th>
                  <th class="sortable r" :class="{'sort-active': invSortKey==='views'}"       @click="invSortBy('views')"        style="width:54px" :style="$store.dw.trafficLoading ? 'color:var(--ink-4)' : ''">Views<span x-text="invSortGlyph('views')"></span></th>
                  <th class="sortable r" :class="{'sort-active': invSortKey==='impressions'}" @click="invSortBy('impressions')"  style="width:54px" :style="$store.dw.trafficLoading ? 'color:var(--ink-4)' : ''">Imp<span x-text="invSortGlyph('impressions')"></span></th>
                  <th class="sortable r" :class="{'sort-active': invSortKey==='ctr'}"         @click="invSortBy('ctr')"          style="width:44px" :style="$store.dw.trafficLoading ? 'color:var(--ink-4)' : ''">CTR<span x-text="invSortGlyph('ctr')"></span></th>
                  <th style="width:170px"></th>
                </tr>
              </thead>
            <template x-for="row in sortedInventory" :key="row.sku">
              <tbody>
                <!-- Summary row -->
                <tr :style="ebayQueue.includes(row.sku) ? 'border-left:2px solid var(--blue)' : ebayBatchResults[row.sku]?.ok ? 'border-left:2px solid var(--green)' : ebayBatchResults[row.sku]?.error ? 'border-left:2px solid var(--red)' : ''">
                  <td style="font:700 11px/1 var(--mono);white-space:nowrap" x-text="row.sku"></td>
                  <td style="font-size:11px;color:var(--muted)" x-text="row.location || '—'"></td>
                  <td style="font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="row.metadata?.manufacturer || '—'"></td>
                  <td style="font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" x-text="row.metadata?.mold || '—'"></td>
                  <td style="font-size:11px;color:var(--ink-2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">
                    <span x-text="inventoryDisplayTitle(row)"></span>
                    <span x-show="row.item_status === 'Prepping'" style="font:700 9px/1 var(--mono);letter-spacing:.08em;color:var(--yellow);margin-left:6px">INTAKE</span>
                    <span x-show="ebayQueue.includes(row.sku)" style="font:700 9px/1 var(--mono);letter-spacing:.08em;color:var(--blue);margin-left:6px">QUEUED</span>
                    <a x-show="ebayBatchResults[row.sku]?.ok" :href="ebayBatchResults[row.sku]?.url" target="_blank"
                       style="font:700 9px/1 var(--mono);letter-spacing:.08em;color:var(--green);margin-left:6px;text-decoration:none">UPDATED →</a>
                    <span x-show="ebayBatchResults[row.sku]?.error" style="font:700 9px/1 var(--mono);letter-spacing:.08em;color:var(--red);margin-left:6px" x-text="ebayBatchResults[row.sku]?.error"></span>
                  </td>
                  <!-- PRICE: inline edit -->
                  <td class="r">
                    <span x-show="priceEditSku !== row.sku"
                          class="price-cell"
                          tabindex="0"
                          :data-sku="row.sku"
                          @keydown.enter.prevent="startPriceEdit(row)"
                          @keydown="if(/^\d$/.test($event.key)){ $event.preventDefault(); startPriceEdit(row, $event.key) }"
                          @click="startPriceEdit(row)"
                          :style="displayPrice(row) ? 'color:var(--ink-1)' : 'color:var(--muted)'"
                          style="font-size:11px;cursor:pointer;outline:none;border-bottom:1px dotted var(--ink-3)"
                          x-text="displayPrice(row) ? '$' + displayPrice(row) : '—'"></span>
                    <span x-show="priceEditSku === row.sku" style="display:flex;gap:4px;align-items:center;justify-content:flex-end">
                      <input type="number" min="0" step="1"
                             x-model.number="priceEditVal"
                             :id="'price-input-' + row.sku"
                             @keydown.enter.prevent="focusPriceQueue(row.sku)"
                             @keydown.escape="cancelPriceEdit()"
                             style="font-size:11px;width:54px;padding:1px 4px;border:1px solid var(--blue);background:var(--bg);color:var(--ink-1)">
                      <button :id="'price-queue-' + row.sku"
                              @click="savePriceEdit(row)"
                              @keydown.tab.prevent="savePriceEditAndAdvance(row, $event)"
                              style="font:700 9px/1 var(--mono);letter-spacing:.08em;padding:2px 8px;background:var(--blue);color:#fff;border:none;cursor:pointer">
                        QUEUE
                      </button>
                      <button @click="cancelPriceEdit()"
                              style="font:700 9px/1 var(--mono);letter-spacing:.08em;padding:2px 6px;background:transparent;border:1px solid var(--ink-3);color:var(--ink-2);cursor:pointer">
                        ✕
                      </button>
                    </span>
                  </td>
                  <!-- TRAFFIC cols -->
                  <td class="r num" x-text="$store.dw.trafficLoading && !$store.dw.trafficMap[row.ebay_listing_id] ? '…' : (row.ebay_listing_id ? ($store.dw.trafficMap[row.ebay_listing_id]?.views ?? '—') : '—')"></td>
                  <td class="r num" x-text="$store.dw.trafficLoading && !$store.dw.trafficMap[row.ebay_listing_id] ? '…' : (row.ebay_listing_id ? ($store.dw.trafficMap[row.ebay_listing_id]?.impressions ?? '—') : '—')"></td>
                  <td class="r num" x-text="$store.dw.trafficLoading && !$store.dw.trafficMap[row.ebay_listing_id] ? '…' : (row.ebay_listing_id && $store.dw.trafficMap[row.ebay_listing_id] ? Math.round($store.dw.trafficMap[row.ebay_listing_id].ctr * 100) + '%' : '—')"></td>
                  <!-- ACTIONS -->
                  <td style="white-space:nowrap">
                    <div style="display:flex;gap:6px;justify-content:flex-end">
                      <button @click="ebayPreviewDisc(row)"
                        x-show="!ebayPreview[row.sku] && row.ebay_listing_id"
                        style="font:700 9px/1 var(--mono);letter-spacing:.1em;padding:3px 8px;background:transparent;border:1px solid var(--blue);color:var(--blue);cursor:pointer">
                        UPDATE EBAY
                      </button>
                      <button @click="editingSku === row.sku ? cancelEdit() : startEdit(row)"
                        style="font:700 9px/1 var(--mono);letter-spacing:.1em;padding:3px 8px;background:transparent;border:1px solid var(--ink-3);color:var(--ink-2);cursor:pointer"
                        x-text="editingSku === row.sku ? '✕ CLOSE' : 'EDIT'"></button>
                    </div>
                  </td>
                </tr>

                <!-- eBay preview panel -->
                <template x-if="ebayPreview[row.sku]">
                  <tr>
                    <td colspan="10" style="padding:10px 10px 14px;border-top:1px solid var(--border)">
                      <template x-if="ebayPreview[row.sku] === 'loading'">
                        <span style="font:700 10px/1 var(--mono);letter-spacing:.08em;color:var(--muted)">FETCHING PREVIEW...</span>
                      </template>
                      <template x-if="ebayPreview[row.sku] !== 'loading'">
                        <div style="display:grid;gap:6px">
                          <template x-if="ebayPreview[row.sku].error">
                            <span style="font-size:11px;color:var(--red)" x-text="ebayPreview[row.sku].error"></span>
                          </template>
                          <template x-if="!ebayPreview[row.sku].error">
                            <div style="display:grid;gap:4px">
                              <div style="font-size:11px"><span style="color:var(--muted);font:700 10px/1 var(--mono)">TITLE </span><span x-text="ebayPreview[row.sku].title"></span></div>
                              <div style="font-size:11px"><span style="color:var(--muted);font:700 10px/1 var(--mono)">PRICE </span><span x-text="'$' + ebayPreview[row.sku].price"></span><span style="color:var(--muted)"> (auto-decline $<span x-text="ebayPreview[row.sku].autoDecline"></span>)</span></div>
                            </div>
                          </template>
                          <template x-if="ebayPreview[row.sku].result">
                            <div style="font-size:11px;padding:4px 0;display:flex;align-items:center;gap:8px">
                              <span :style="ebayPreview[row.sku].result === 'updated' ? 'color:var(--green)' : 'color:var(--red)'"
                                    x-text="ebayPreview[row.sku].result === 'updated' ? 'POSTED TO EBAY' : ebayPreview[row.sku].result"></span>
                              <template x-if="ebayPreview[row.sku].result === 'updated' && ebayPreview[row.sku].url">
                                <a :href="ebayPreview[row.sku].url" target="_blank"
                                   style="font:700 9px/1 var(--mono);letter-spacing:.1em;color:var(--blue);text-decoration:none">VIEW →</a>
                              </template>
                            </div>
                          </template>
                          <div style="display:flex;gap:8px;margin-top:4px">
                            <button @click="ebayConfirmUpdate(row)" :disabled="ebayUpdating[row.sku] || !!ebayPreview[row.sku].error || !!ebayPreview[row.sku].result"
                              style="font:700 9px/1 var(--mono);letter-spacing:.1em;padding:4px 14px;background:var(--blue);color:#fff;border:none;cursor:pointer"
                              x-text="ebayUpdating[row.sku] ? 'POSTING TO EBAY...' : 'CONFIRM'"></button>
                            <button @click="ebayCancelPreview(row.sku)"
                              style="font:700 9px/1 var(--mono);letter-spacing:.1em;padding:4px 14px;background:transparent;border:1px solid var(--ink-3);color:var(--ink-2);cursor:pointer">
                              CANCEL
                            </button>
                          </div>
                        </div>
                      </template>
                    </td>
                  </tr>
                </template>

                <!-- Edit panel -->
                <template x-if="editingSku === row.sku">
                  <tr>
                    <td colspan="10" style="padding:12px 10px 16px">
                      <div style="display:grid;gap:6px">
                        <div style="display:grid;grid-template-columns:160px 1fr;gap:8px;align-items:center">
                          <span style="font:700 10px/1 var(--mono);letter-spacing:.08em;color:var(--muted)">location</span>
                          <input type="text" x-model="editLocation"
                            style="font-size:12px;padding:3px 6px;border:1px solid var(--border);background:var(--bg);color:var(--ink-1);width:100%"
                            @keydown.escape="cancelEdit()">
                        </div>
                        <template x-for="(pair, idx) in editPairs" :key="idx">
                          <div style="display:grid;grid-template-columns:160px 1fr;gap:8px;align-items:center">
                            <span style="font:700 10px/1 var(--mono);letter-spacing:.08em;color:var(--muted)" x-text="pair.key"></span>
                            <input type="text" x-model="editPairs[idx].value"
                              style="font-size:12px;padding:3px 6px;border:1px solid var(--border);background:var(--bg);color:var(--ink-1);width:100%"
                              @keydown.escape="cancelEdit()">
                          </div>
                        </template>
                        <div style="display:flex;gap:8px;margin-top:4px">
                          <button @click="saveEdit()" :disabled="editSaving"
                            style="font:700 9px/1 var(--mono);letter-spacing:.1em;padding:4px 14px;background:var(--blue);color:#fff;border:none;cursor:pointer"
                            x-text="editSaving ? '...' : 'SAVE'"></button>
                          <button @click="cancelEdit()"
                            style="font:700 9px/1 var(--mono);letter-spacing:.1em;padding:4px 14px;background:transparent;border:1px solid var(--ink-3);color:var(--ink-2);cursor:pointer">
                            CANCEL
                          </button>
                        </div>
                      </div>
                    </td>
                  </tr>
                </template>

              </tbody>
            </template><!-- /x-for -->
            </table>
          </div>
        </template>
      </div>

      </div><!-- /catalog padding wrapper -->
    </div>
