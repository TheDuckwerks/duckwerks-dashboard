# .land.toml -- dash's fills for the org `land` ritual (config/skills/land).
# The skill holds the beats; this holds the commands. Empty = skip that beat.

[project]
name    = "duckwerks-dashboard"
tracker = "TheDuckwerks/duckwerks-dashboard"

[version]
command = "npm version {level} --no-git-tag-version"
# Also bump APP_VERSION in public/v2/js/config.js -- the sidebar reads it.
# Patch every land that ships something; tag minor/major only, never per patch.

[log]
mode = "manual"
file = "docs/session-log.md"
command = ""

[docs]
regen = ""
build = ""

[lint]
command = "gander"

[deploy]
docs = ""
app  = "/Users/Shared/duckwerks/projects/duckwerks-ops/infra-scripts/ship duckwerks"
